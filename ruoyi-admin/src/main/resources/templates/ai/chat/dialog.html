<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('AI对话')" />
	<style>
		.chat-container {
			height: calc(100vh - 200px);
			display: flex;
			flex-direction: column;
		}
		.chat-messages {
			flex: 1;
			overflow-y: auto;
			padding: 15px;
			background: #f9f9f9;
			border: 1px solid #e7eaec;
			border-radius: 4px;
			margin-bottom: 15px;
		}
		.message {
			margin-bottom: 15px;
			padding: 10px 15px;
			border-radius: 8px;
			max-width: 80%;
		}
		.message-user {
			background: #1ab394;
			color: white;
			margin-left: auto;
			text-align: right;
		}
		.message-ai {
			background: white;
			border: 1px solid #e7eaec;
		}
		.message-time {
			font-size: 12px;
			color: #999;
			margin-top: 5px;
		}
		.chat-input {
			display: flex;
			gap: 10px;
		}
		.chat-input textarea {
			flex: 1;
			resize: none;
			height: 80px;
		}
		.platform-select {
			margin-bottom: 15px;
		}
		.loading {
			text-align: center;
			padding: 20px;
			color: #999;
		}
	</style>
</head>
<body class="gray-bg">
    <div class="container-div">
		<div class="row">
			<div class="col-sm-12">
				<div class="ibox float-e-margins">
					<div class="ibox-title">
						<h5>AI对话</h5>
					</div>
					<div class="ibox-content">
						<div class="platform-select">
							<label>选择平台：</label>
							<select id="platformCode" class="form-control" style="width: 200px; display: inline-block;">
								<option value="">请选择AI平台</option>
							</select>
							<label style="margin-left: 20px;">模型：</label>
							<input type="text" id="model" class="form-control" style="width: 200px; display: inline-block;" placeholder="留空使用默认模型">
						</div>
						<div class="chat-container">
							<div class="chat-messages" id="chatMessages">
								<div class="loading" id="loadingTip" style="display: none;">
									<i class="fa fa-spinner fa-spin"></i> AI正在思考中...
								</div>
							</div>
							<div class="chat-input">
								<textarea id="messageInput" class="form-control" placeholder="请输入您的问题..."></textarea>
								<button type="button" class="btn btn-primary" onclick="sendMessage()">
									<i class="fa fa-paper-plane"></i> 发送
								</button>
								<button type="button" class="btn btn-warning" onclick="clearChat()">
									<i class="fa fa-trash"></i> 清空
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "api/ai";
        
        $(function() {
            loadPlatforms();
            
            $('#messageInput').keydown(function(e) {
                if (e.ctrlKey && e.keyCode == 13) {
                    sendMessage();
                }
            });
        });
        
        function loadPlatforms() {
            $.ajax({
                url: prefix + "/platforms",
                type: "get",
                success: function(result) {
                    if (result.code == 0) {
                        var platforms = result.data;
                        var html = '<option value="">请选择AI平台</option>';
                        for (var i = 0; i < platforms.length; i++) {
                            html += '<option value="' + platforms[i].platformCode + '">' + platforms[i].platformName + '</option>';
                        }
                        $("#platformCode").html(html);
                    }
                }
            });
        }
        
        function sendMessage() {
            var platformCode = $("#platformCode").val();
            var model = $("#model").val();
            var message = $("#messageInput").val().trim();
            
            if (!platformCode) {
                $.modal.alertWarning("请选择AI平台");
                return;
            }
            
            if (!message) {
                $.modal.alertWarning("请输入问题");
                return;
            }
            
            addMessage(message, 'user');
            $("#messageInput").val('');
            $("#loadingTip").show();
            
            $.ajax({
                url: prefix + "/chat",
                type: "post",
                contentType: "application/json",
                data: JSON.stringify({
                    platformCode: platformCode,
                    model: model,
                    message: message
                }),
                success: function(result) {
                    $("#loadingTip").hide();
                    if (result.code == 0) {
                        var chat = result.data;
                        addMessage(chat.aiResponse, 'ai', chat.modelName, chat.totalTokens);
                    } else {
                        addMessage("请求失败: " + result.msg, 'ai');
                    }
                },
                error: function(xhr, status, error) {
                    $("#loadingTip").hide();
                    addMessage("请求出错: " + error, 'ai');
                }
            });
        }
        
        function addMessage(content, type, model, tokens) {
            var now = new Date();
            var timeStr = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            var html = '<div class="message message-' + type + '">';
            html += '<div>' + content + '</div>';
            if (type == 'ai' && model) {
                html += '<div class="message-time">模型: ' + model + (tokens ? ' | Tokens: ' + tokens : '') + '</div>';
            } else {
                html += '<div class="message-time">' + timeStr + '</div>';
            }
            html += '</div>';
            
            $("#chatMessages").find('.loading').before(html);
            
            var chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function clearChat() {
            $("#chatMessages").find('.message').remove();
        }
    </script>
</body>
</html>
