<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增AI平台配置')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-platform-add">
        <div class="form-group">	
            <label class="col-sm-3 control-label is-required">平台名称：</label>
            <div class="col-sm-8">
                <input id="platformName" name="platformName" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">	
            <label class="col-sm-3 control-label is-required">平台编码：</label>
            <div class="col-sm-8">
                <input id="platformCode" name="platformCode" class="form-control" type="text" required>
                <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 如：qwen、yuanbao、doubao</span>
            </div>
        </div>
        <div class="form-group">	
            <label class="col-sm-3 control-label is-required">API地址：</label>
            <div class="col-sm-8">
                <input id="apiUrl" name="apiUrl" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">	
            <label class="col-sm-3 control-label">API密钥：</label>
            <div class="col-sm-8">
                <input id="apiKey" name="apiKey" class="form-control" type="password">
            </div>
        </div>
        <div class="form-group">	
            <label class="col-sm-3 control-label">默认模型：</label>
            <div class="col-sm-8">
                <input id="defaultModel" name="defaultModel" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
			<label class="col-sm-3 control-label">状态：</label>
			<div class="col-sm-8">
			    <div class="radio-box" th:each="dict : ${@dict.getType('sys_normal_disable')}">
					<input type="radio" th:id="${dict.dictCode}" name="status" th:value="${dict.dictValue}" th:checked="${dict.default}">
					<label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
				</div>
			</div>
		</div>
		<div class="form-group">	
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea id="remark" name="remark" class="form-control"></textarea>
            </div>
        </div>
    </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
	    var prefix = ctx + "ai/platform";
	
	    $("#form-platform-add").validate({
	    	onkeyup: false,
	        rules: {
	            platformName: {
	                required: true
	            },
	            platformCode: {
	                required: true
	            },
	            apiUrl: {
	                required: true
	            }
	        },
	        messages: {
	            "platformName": {
	                required: "请输入平台名称"
	            },
	            "platformCode": {
	                required: "请输入平台编码"
	            },
	            "apiUrl": {
	                required: "请输入API地址"
	            }
	        },
	        focusCleanup: true
	    });
	    
	    function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/add", $('#form-platform-add').serialize());
	        }
	    }
	</script>
</body>
</html>
